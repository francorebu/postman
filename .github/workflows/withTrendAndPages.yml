name: withTrendAndPages

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman + Allure
        run: |
          npm install -g newman
          npm install -g newman-reporter-allure

          wget -q https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxf allure-2.29.0.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      # 🔥 Recupera history anterior desde gh-pages
      - name: Restore Allure history
        if: always()
        run: |
          git fetch origin gh-pages || true

          mkdir -p allure-results/history

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout origin/gh-pages -- history || true

            if [ -d history ]; then
              cp -r history/* allure-results/history/
            fi
          fi

      - name: Run Postman Collection
        run: |
          newman run collections/RestCollection.postman_collection.json \
          -r allure \
          --reporter-allure-export ./allure-results

      - name: Generate Allure Report
        run: |
          allure generate ./allure-results --clean -o ./allure-report

      # 🔥 Guarda el nuevo history para próximas corridas
      - name: Prepare history folder
        run: |
          mkdir -p history
          cp -r allure-report/history/* history/

      # 🔥 Commit history en gh-pages
      - name: Commit history
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com

          git fetch origin gh-pages || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages || git checkout -b gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
          fi

          cp -r history ./history-temp || true

          git rm -rf . || true

          cp -r history-temp history || true

          rm -rf history-temp

          git add history
          git commit -m "Update Allure history" || echo "No changes to commit"

          git push origin gh-pages

          git checkout -

      # 🔥 Upload artifact para Pages
      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

      # 🔥 Deploy GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
