name: withTrendAndPagess

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman + Allure
        run: |
          npm install -g newman
          npm install -g newman-reporter-allure

          wget -q https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxf allure-2.29.0.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Run Postman Collection
        run: |
          newman run collections/RestCollection.postman_collection.json \
          -r allure \
          --reporter-allure-export ./allure-results

      # 🔥 Recupera history (para trend)
      - name: Restore Allure history
        if: always()
        run: |
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git fetch origin gh-pages
            mkdir -p allure-results/history
            git checkout origin/gh-pages -- history/ 2>/dev/null && \
            cp -r history/. allure-results/history/ || echo "No history yet"
          else
            echo "First run - no gh-pages branch yet"
          fi

      - name: Generate Allure Report
        run: |
          allure generate ./allure-results --clean -o ./allure-report

      # 🔥 Guarda history para el próximo run
      - name: Save history
        run: |
          mkdir -p allure-report/history
          cp -r allure-results/history/. allure-report/history/ || true

      # 🔥 Publica en GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
